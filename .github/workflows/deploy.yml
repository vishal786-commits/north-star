name: Deploy

# Auto-deploy master to ECS Fargate after tests pass. Build → push to ECR →
# register a new task-definition revision with the new image → update the service.

on:
  push:
    branches: [master]

permissions:
  id-token: write   # required for OIDC — assume the AWS role with no stored keys
  contents: read

jobs:
  test:
    name: Lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - run: ruff check app tests
      - run: pytest -q

  deploy:
    name: Build & deploy to ECS
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: build
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE="$REGISTRY/$REPOSITORY:$IMAGE_TAG"
          docker build -t "$IMAGE" -t "$REGISTRY/$REPOSITORY:latest" .
          docker push "$IMAGE"
          docker push "$REGISTRY/$REPOSITORY:latest"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Fetch current task definition
        # Express Mode owns the service/task-def, so we start from the live
        # revision and only swap the image — no committed task-def to drift.
        env:
          TASK_FAMILY: ${{ vars.ECS_TASK_FAMILY }}
        run: |
          aws ecs describe-task-definition --task-definition "$TASK_FAMILY" \
            --query 'taskDefinition' --output json \
            | jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' \
            > task-definition.json

      - name: Render new image into task definition
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ vars.ECS_CONTAINER_NAME }}
          image: ${{ steps.build.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ vars.ECS_SERVICE }}
          cluster: ${{ vars.ECS_CLUSTER }}
          wait-for-service-stability: true
